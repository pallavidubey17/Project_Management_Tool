{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">My Projects</h1>
    <a href="{% url 'create_project' %}" class="btn btn-primary mb-3">New Project</a>
    <div class="row">
        {% for project in projects %}
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ project.title }}</h5>
                    <p class="card-text">{{ project.description }}</p>
                    <p class="text-muted">Status: {{ project.status }}</p>
                    <a href="{% url 'project_detail' project.pk %}" class="btn btn-sm btn-outline-primary">View</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
