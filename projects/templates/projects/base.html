<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Manager{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }

        /* Navbar */
        nav { background: #1a1a2e; color: white; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        nav .brand { font-size: 1.3rem; font-weight: 700; color: #e94560; letter-spacing: 1px; text-decoration: none; }
        nav .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        nav .nav-links a { color: #ccc; text-decoration: none; font-size: 0.95rem; transition: color 0.2s; }
        nav .nav-links a:hover { color: #e94560; }
        nav .nav-links .btn-logout { background: #e94560; color: white; padding: 6px 16px; border-radius: 6px; font-size: 0.85rem; }
        nav .nav-links .btn-logout:hover { background: #c73652; color: white; }

        /* Layout */
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

        /* Cards */
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 1.5rem; margin-bottom: 1.5rem; }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: #1a1a2e; }

        /* Buttons */
        .btn { display: inline-block; padding: 9px 20px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: #1a1a2e; color: white; }
        .btn-primary:hover { background: #e94560; }
        .btn-danger { background: #e94560; color: white; }
        .btn-danger:hover { background: #c73652; }
        .btn-secondary { background: #eee; color: #444; }
        .btn-secondary:hover { background: #ddd; }
        .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #1e8449; }

        /* Alerts */
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #27ae60; }
        .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #e94560; }

        /* Stat boxes */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-box { background: white; border-radius: 12px; padding: 1.2rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .stat-box .stat-num { font-size: 2rem; font-weight: 700; color: #e94560; }
        .stat-box .stat-label { font-size: 0.85rem; color: #888; margin-top: 4px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        th { background: #f8f9fa; font-weight: 600; color: #555; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        /* Badges */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-planning { background: #fff3cd; color: #856404; }
        .badge-active { background: #d1ecf1; color: #0c5460; }
        .badge-on_hold { background: #f8d7da; color: #721c24; }
        .badge-completed { background: #d4edda; color: #155724; }
        .badge-todo { background: #e2e3e5; color: #383d41; }
        .badge-in_progress { background: #cce5ff; color: #004085; }
        .badge-done { background: #d4edda; color: #155724; }
        .badge-high { background: #f8d7da; color: #721c24; }
        .badge-medium { background: #fff3cd; color: #856404; }
        .badge-low { background: #d4edda; color: #155724; }

        /* Forms */
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.9rem; font-family: inherit; transition: border 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #1a1a2e; }
        .form-group textarea { min-height: 100px; resize: vertical; }

        /* Page header */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .page-header h1 { font-size: 1.6rem; color: #1a1a2e; }

        /* Two-col grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media(max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

        /* Empty state */
        .empty-state { text-align: center; padding: 3rem 1rem; color: #aaa; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

        /* Progress bar */
        .progress-bar { background: #eee; border-radius: 10px; height: 8px; margin-top: 6px; }
        .progress-fill { background: #27ae60; height: 8px; border-radius: 10px; transition: width 0.4s; }
    </style>
</head>
<body>

{% if user.is_authenticated %}
<nav>
    <a class="brand" href="{% url 'dashboard' %}">📋 ProjectHub</a>
    <div class="nav-links">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'project_list' %}">Projects</a>
        <span style="color:#888;">Hi, {{ user.username }}</span>
        <a class="btn-logout" href="{% url 'logout' %}">Logout</a>
    </div>
</nav>
{% endif %}

<div class="container">
    {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
    {% endfor %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
