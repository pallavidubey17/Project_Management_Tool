<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ProjectHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 2.5rem; width: 100%; max-width: 420px; }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand h1 { font-size: 1.8rem; color: #1a1a2e; }
        .brand p { color: #888; font-size: 0.9rem; margin-top: 4px; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; transition: border 0.2s; }
        .form-group input:focus { outline: none; border-color: #1a1a2e; }
        .btn { width: 100%; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #e94560; }
        .link-row { text-align: center; margin-top: 1.2rem; font-size: 0.9rem; color: #888; }
        .link-row a { color: #e94560; text-decoration: none; font-weight: 500; }
        .alert-error { padding: 10px 14px; border-radius: 8px; margin-bottom: 1rem; font-size: 0.88rem; background: #f8d7da; color: #721c24; border-left: 4px solid #e94560; }
        .alert-success { padding: 10px 14px; border-radius: 8px; margin-bottom: 1rem; font-size: 0.88rem; background: #d4edda; color: #155724; border-left: 4px solid #27ae60; }
    </style>
</head>
<body>
<div class="auth-box">
    <div class="brand">
        <h1>📋 ProjectHub</h1>
        <p>Create your account</p>
    </div>

    {% for message in messages %}
    <div class="{% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">{{ message }}</div>
    {% endfor %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required autofocus placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password1" required placeholder="Choose a password">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="password2" required placeholder="Repeat your password">
        </div>
        <button type="submit" class="btn">Create Account</button>
    </form>

    <div class="link-row">
        Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
</div>
</body>
</html>
